<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>Carret</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #C2441C;
      --shot: #1a1a1a;
      --ink: #111;
      --paper: #fff;
      --mute: #888;
      --line: #e8e8e8;
      --bg2: #f4f4f4;
      --sans: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: var(--paper);
      font-family: var(--sans);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }

    /* ── Status bar ── */
    .status {
      flex: 0 0 auto;
      height: 2.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .body {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Loading / error ── */
    .loading-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.875rem;
    }
    .spinner {
      width: 1.5rem;
      height: 1.5rem;
      border: 2px solid var(--line);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-label { font-size: 0.8125rem; color: var(--mute); }

    /* ── Camera ── */
    .cam-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1.25rem 0.625rem;
    }
    .cam-roll { font-size: 0.9375rem; font-weight: 600; }
    .cam-count { font-size: 0.875rem; color: var(--mute); font-weight: 500; }

    .viewfinder {
      flex: 1;
      background: #111;
      margin: 0 1rem;
      border-radius: 0.875rem;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    #cam-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .vf-flash {
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.05s;
    }
    .vf-flash.active { opacity: 1; }
    .vf-msg {
      color: rgba(255,255,255,0.55);
      font-size: 0.8125rem;
      text-align: center;
      padding: 2rem;
      line-height: 1.6;
    }

    .cam-bottom {
      padding: 1.25rem 0 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .shutter {
      width: 5rem;
      height: 5rem;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 0 3px var(--paper), 0 0 0 4.5px var(--ink);
      border: none;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .shutter:active { transform: scale(0.92); }
    .shutter:disabled { opacity: 0.35; }

    .cam-progress {
      padding: 0 1.25rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.3125rem;
    }
    .prog-bar-wrap {
      height: 3px;
      background: var(--line);
      border-radius: 2px;
      overflow: hidden;
    }
    .prog-bar {
      height: 100%;
      background: var(--orange);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .prog-label {
      font-size: 0.6875rem;
      color: var(--mute);
      text-align: center;
    }

    /* ── Roll ── */
    .roll-head {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
      padding: 1rem 1.25rem 0.75rem;
    }
    .roll-head .rname { font-size: 1rem; font-weight: 600; }
    .roll-head .rmeta { font-size: 0.6875rem; color: var(--mute); }

    .roll-grid {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: min-content;
      gap: 0.5rem;
      padding: 0 1rem 1rem;
    }
    .roll-grid::-webkit-scrollbar { display: none; }

    .cell {
      aspect-ratio: 1 / 1;
      min-width: 0;
      border-radius: 0.375rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.625rem;
      font-weight: 500;
      position: relative;
    }
    .cell.empty {
      background: var(--bg2);
      border: 1px solid var(--line);
      color: var(--mute);
    }
    .cell.taken { background: var(--shot); }
    .cell.taken::after {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
    }
    .cell.taken.unlocked {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, opacity 0.1s;
    }
    .cell.taken.unlocked:active { transform: scale(0.93); opacity: 0.7; }
    .cell.next {
      background: var(--orange);
      color: white;
      font-size: 1.5rem;
      font-weight: 300;
      line-height: 1;
    }

    /* ── Banners ── */
    .full-banner {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.625rem;
      padding: 1.5rem;
      text-align: center;
    }
    .full-banner .emoji { font-size: 2.5rem; }
    .full-banner .title { font-size: 1rem; font-weight: 600; }
    .full-banner .sub { font-size: 0.8125rem; color: var(--mute); line-height: 1.5; }

    .btn-primary {
      margin-top: 0.5rem;
      padding: 0.75rem 1.75rem;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 2rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--sans);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-primary:active { opacity: 0.82; }

    .roll-footer {
      padding: 0.625rem 1.25rem 0.875rem;
      display: flex;
      gap: 0.625rem;
      justify-content: center;
      align-items: center;
    }
    .btn-secondary {
      padding: 0.625rem 1.25rem;
      background: transparent;
      color: var(--mute);
      border: 1px solid var(--line);
      border-radius: 2rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--sans);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-secondary:active { background: var(--bg2); }

    /* ── Dates ── */
    .year-strip {
      display: flex;
      padding: 0.875rem 1.25rem 0.125rem;
      font-size: 0.5625rem;
      color: var(--mute);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
      overflow-x: auto;
      gap: 0.125rem;
    }
    .year-strip::-webkit-scrollbar { display: none; }
    .year-strip .m {
      padding: 0.25rem 0.4rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .year-strip .m.active {
      color: var(--ink);
      font-weight: 700;
      border-bottom: 1.5px solid var(--orange);
    }

    .cal-head { padding: 0.625rem 1.25rem 0.25rem; }
    .cal-head .month {
      font-size: 1.375rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 0.375rem 1rem 0.125rem;
      font-size: 0.5625rem;
      color: var(--mute);
      text-align: center;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 0.25rem 1rem 1rem;
      gap: 0.1875rem 0;
      text-align: center;
    }
    .day {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      position: relative;
      z-index: 0;
    }
    .day.muted { color: var(--mute); opacity: 0.4; }
    .day.shot-day { color: white; font-weight: 500; }
    .day.shot-day::before {
      content: '';
      position: absolute;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      background: var(--orange);
      z-index: -1;
    }
    .day.today { font-weight: 700; }
    .day.today:not(.shot-day)::before {
      content: '';
      position: absolute;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      border: 1.5px solid var(--ink);
      z-index: -1;
    }

    /* ── Nav ── */
    .nav {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--line);
      background: var(--paper);
      height: 3.5rem;
    }
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.1875rem;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0.375rem 0 0;
      color: var(--mute);
      font-family: var(--sans);
      position: relative;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .nav-btn.active { color: var(--orange); }
    .nav-btn.active::before {
      content: '';
      position: absolute;
      top: 0;
      width: 1.375rem;
      height: 2px;
      background: var(--orange);
      border-radius: 0 0 2px 2px;
    }
    .nav-btn svg { width: 1.375rem; height: 1.375rem; stroke: currentColor; fill: none; stroke-width: 1.5; }
    .nav-btn .lbl { font-size: 0.5625rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; }

    /* ── Photo modal ── */
    .photo-modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(env(safe-area-inset-top, 0px) + 1rem) 1rem calc(env(safe-area-inset-bottom, 0px) + 1rem);
    }
    .photo-modal img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 0.5rem;
    }
    .modal-close {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 0.75rem);
      right: 1rem;
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-num {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 1rem);
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="status">
      <span id="st">--:--</span>
      <span>●●●</span>
    </div>
    <div class="body" id="body"></div>
    <nav class="nav">
      <button class="nav-btn" data-s="camera" onclick="go('camera')">
        <svg viewBox="0 0 24 24"><path d="M3 7.5h3.5L8 5.5h8L17.5 7.5H21v11.5H3z" stroke-linejoin="round"/><circle cx="12" cy="13" r="3.5"/></svg>
        <span class="lbl">Camera</span>
      </button>
      <button class="nav-btn" data-s="roll" onclick="go('roll')">
        <svg viewBox="0 0 24 24"><rect x="3.5" y="3.5" width="6" height="6" rx="0.5"/><rect x="14.5" y="3.5" width="6" height="6" rx="0.5"/><rect x="3.5" y="14.5" width="6" height="6" rx="0.5"/><rect x="14.5" y="14.5" width="6" height="6" rx="0.5"/></svg>
        <span class="lbl">Roll</span>
      </button>
      <button class="nav-btn" data-s="dates" onclick="go('dates')">
        <svg viewBox="0 0 24 24"><rect x="3.5" y="5.5" width="17" height="15" rx="1.5"/><path d="M3.5 10h17"/><path d="M8 3.5v4M16 3.5v4"/></svg>
        <span class="lbl">Dates</span>
      </button>
    </nav>
  </div>

  <script>
    const SUPABASE_URL = 'https://vkjjitezqzxcqbhmngos.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZramppdGV6cXp4Y3FiaG1uZ29zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjI3NTIsImV4cCI6MjA5NDQzODc1Mn0.tOMZJvEQv1OyFOs1Tt4-oizHDFvJRJtlQxgAuE8skWc';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const TOTAL = 36;

    let roll = null;        // { id, created_at, completed }
    let photos = [];        // [{ id, taken_at }]
    let imgCache = {};      // photo_id → data-URL
    let shots = 0;
    let screen = 'roll';
    let videoStream = null;
    let isSaving = false;

    // ── Clock ──
    function tick() {
      const n = new Date();
      const el = document.getElementById('st');
      if (el) el.textContent =
        `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
    }
    tick();
    setInterval(tick, 30000);

    // ── Loading / error ──
    function showLoading() {
      document.getElementById('body').innerHTML =
        `<div class="loading-screen"><div class="spinner"></div><div class="loading-label">Carregant…</div></div>`;
    }
    function showErr(msg) {
      document.getElementById('body').innerHTML =
        `<div class="loading-screen"><div style="font-size:2rem">⚠️</div><div class="loading-label">${msg}</div></div>`;
    }

    // ── Navigation ──
    function go(s) {
      if (screen === 'camera' && s !== 'camera') stopCamera();
      screen = s;
      document.querySelectorAll('.nav-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.s === s));
      render();
      if (s === 'camera') requestAnimationFrame(startCamera);
    }

    // ── Init ──
    async function init() {
      showLoading();
      try {
        const savedId = localStorage.getItem('carret_roll_id');
        if (savedId) {
          const { data } = await db.from('rolls').select('*').eq('id', savedId).single();
          if (data) roll = data;
        }
        if (!roll) {
          const { data, error } = await db.from('rolls')
            .insert({ completed: false }).select().single();
          if (error) throw error;
          roll = data;
          localStorage.setItem('carret_roll_id', roll.id);
        }
        const { data, error } = await db.from('photos')
          .select('id, taken_at')
          .eq('roll_id', roll.id)
          .order('taken_at', { ascending: true });
        if (error) throw error;
        photos = data || [];
        shots = photos.length;
        go('roll');
      } catch(e) {
        console.error(e);
        showErr('Error de connexió');
      }
    }

    // ── New roll ──
    async function newRoll() {
      showLoading();
      try {
        const { data, error } = await db.from('rolls')
          .insert({ completed: false }).select().single();
        if (error) throw error;
        roll = data;
        photos = [];
        imgCache = {};
        shots = 0;
        localStorage.setItem('carret_roll_id', roll.id);
        go('camera');
      } catch(e) {
        console.error(e);
        showErr('Error en crear el carret');
      }
    }

    // ── Camera ──
    async function startCamera() {
      if (!document.querySelector('.viewfinder')) return;
      if (roll?.completed || shots >= TOTAL) return;
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });
        const vid = document.getElementById('cam-video');
        if (vid) { vid.srcObject = videoStream; await vid.play(); }
      } catch(e) {
        const vf = document.querySelector('.viewfinder');
        if (vf) vf.innerHTML =
          `<div class="vf-msg">📷<br><br>Permet l'accés a la càmera<br>a Configuració del dispositiu</div>`;
      }
    }

    function stopCamera() {
      if (videoStream) {
        videoStream.getTracks().forEach(t => t.stop());
        videoStream = null;
      }
    }

    async function takeShot() {
      if (shots >= TOTAL || isSaving) return;
      const vid = document.getElementById('cam-video');
      if (!vid || !videoStream || vid.readyState < 2 || vid.videoWidth === 0) return;

      isSaving = true;
      const btn = document.querySelector('.shutter');
      if (btn) btn.disabled = true;

      // Flash
      const flash = document.querySelector('.vf-flash');
      if (flash) {
        flash.classList.add('active');
        setTimeout(() => flash.classList.remove('active'), 80);
      }

      // Capture frame → JPEG base64
      const canvas = document.createElement('canvas');
      const max = 1280;
      const r = Math.min(max / vid.videoWidth, max / vid.videoHeight, 1);
      canvas.width  = Math.round(vid.videoWidth  * r);
      canvas.height = Math.round(vid.videoHeight * r);
      canvas.getContext('2d').drawImage(vid, 0, 0, canvas.width, canvas.height);
      const imgData = canvas.toDataURL('image/jpeg', 0.8);

      try {
        const takenAt = new Date().toISOString();
        const { data, error } = await db.from('photos')
          .insert({ roll_id: roll.id, taken_at: takenAt, image_data: imgData })
          .select('id, taken_at').single();
        if (error) throw error;

        photos.push({ id: data.id, taken_at: data.taken_at });
        imgCache[data.id] = imgData;
        shots++;

        if (shots >= TOTAL) {
          await db.from('rolls').update({ completed: true }).eq('id', roll.id);
          roll.completed = true;
          stopCamera();
          setTimeout(() => go('roll'), 300);
        } else {
          // Update in-place — no full re-render
          const cc = document.querySelector('.cam-count');
          if (cc) cc.textContent = `${shots}/${TOTAL}`;
          const pb = document.querySelector('.prog-bar');
          if (pb) pb.style.width = `${(shots / TOTAL * 100).toFixed(1)}%`;
          const pl = document.querySelector('.prog-label');
          if (pl) pl.textContent = `${shots} / ${TOTAL} fotos`;
          if (btn) btn.disabled = false;
        }
      } catch(e) {
        console.error('Save error:', e);
        if (btn) btn.disabled = false;
      }
      isSaving = false;
    }

    // ── Photo viewer ──
    async function viewPhoto(idx) {
      const p = photos[idx];
      if (!p) return;

      let imgData = imgCache[p.id];
      if (!imgData) {
        const loading = document.createElement('div');
        loading.className = 'photo-modal';
        loading.id = 'pmodal';
        loading.innerHTML =
          `<div class="spinner" style="border-color:rgba(255,255,255,.2);border-top-color:#fff"></div>`;
        document.body.appendChild(loading);

        const { data, error } = await db.from('photos')
          .select('image_data').eq('id', p.id).single();
        document.getElementById('pmodal')?.remove();
        if (error || !data) return;
        imgData = data.image_data;
        imgCache[p.id] = imgData;
      }

      const modal = document.createElement('div');
      modal.className = 'photo-modal';
      modal.id = 'pmodal';
      modal.innerHTML = `
        <img src="${imgData}" alt="Foto ${idx + 1}">
        <button class="modal-close" onclick="document.getElementById('pmodal').remove()">✕</button>
        <div class="modal-num">${idx + 1} / ${shots}</div>
      `;
      modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
      document.body.appendChild(modal);
    }

    // ── Render ──
    function render() {
      if (screen === 'camera') renderCamera();
      else if (screen === 'roll') renderRoll();
      else renderDates();
    }

    function renderCamera() {
      if (roll?.completed || shots >= TOTAL) {
        document.getElementById('body').innerHTML = `
          <div class="full-banner">
            <div class="emoji">🎞️</div>
            <div class="title">Carret ple!</div>
            <div class="sub">Has fet ${TOTAL} fotos.<br>Ves a Roll per veure-les.</div>
            <button class="btn-primary" onclick="newRoll()">Nou carret →</button>
          </div>`;
        return;
      }
      const pct = (shots / TOTAL * 100).toFixed(1);
      document.getElementById('body').innerHTML = `
        <div class="cam-top">
          <span class="cam-roll">spring · 26</span>
          <span class="cam-count">${shots}/${TOTAL}</span>
        </div>
        <div class="viewfinder">
          <video id="cam-video" autoplay playsinline muted></video>
          <div class="vf-flash"></div>
        </div>
        <div class="cam-bottom">
          <button class="shutter" onclick="takeShot()" aria-label="disparar"></button>
        </div>
        <div class="cam-progress">
          <div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
          <div class="prog-label">${shots} / ${TOTAL} fotos</div>
        </div>`;
    }

    function renderRoll() {
      const full = roll?.completed;
      let cells = '';
      for (let i = 0; i < TOTAL; i++) {
        if (i < shots) {
          cells += full
            ? `<div class="cell taken unlocked" onclick="viewPhoto(${i})"></div>`
            : `<div class="cell taken"></div>`;
        } else if (i === shots && !full) {
          cells += `<div class="cell next">+</div>`;
        } else {
          cells += `<div class="cell empty">${String(i + 1).padStart(2, '0')}</div>`;
        }
      }
      const meta = full
        ? 'roll complet · toca una foto per veure-la'
        : `roll 03 — ${shots} of ${TOTAL}`;
      const footer = full ? `
        <div class="roll-footer">
          <button class="btn-primary">Enviar a impressió ↗</button>
          <button class="btn-secondary" onclick="newRoll()">Nou carret</button>
        </div>` : '';
      document.getElementById('body').innerHTML = `
        <div class="roll-head">
          <span class="rname">spring · 26</span>
          <span class="rmeta">${meta}</span>
        </div>
        <div class="roll-grid">${cells}</div>
        ${footer}`;
    }

    function renderDates() {
      const now = new Date();
      const yr = now.getFullYear(), mo = now.getMonth(), today = now.getDate();

      const shotDays = new Set(
        photos
          .map(p => new Date(p.taken_at))
          .filter(d => d.getFullYear() === yr && d.getMonth() === mo)
          .map(d => d.getDate())
      );

      const long = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
      const short = ['Jan','Feb','Mar','Apr','May','Jun',
                     'Jul','Aug','Sep','Oct','Nov','Dec'];

      const mstrip = short.map((m, i) =>
        `<span class="m${i === mo ? ' active' : ''}">${m}</span>`).join('');

      const firstWd    = new Date(yr, mo, 1).getDay();
      const daysInMo   = new Date(yr, mo + 1, 0).getDate();
      const prevMonEnd = new Date(yr, mo, 0).getDate();
      const totalCells = Math.ceil((firstWd + daysInMo) / 7) * 7;

      let ds = '';
      for (let i = firstWd - 1; i >= 0; i--)
        ds += `<div class="day muted">${prevMonEnd - i}</div>`;
      for (let d = 1; d <= daysInMo; d++)
        ds += `<div class="day${shotDays.has(d) ? ' shot-day' : ''}${d === today ? ' today' : ''}">${d}</div>`;
      for (let d = 1; d <= totalCells - firstWd - daysInMo; d++)
        ds += `<div class="day muted">${d}</div>`;

      document.getElementById('body').innerHTML = `
        <div class="year-strip">${mstrip}</div>
        <div class="cal-head"><div class="month">${long[mo]} ${yr}</div></div>
        <div class="weekdays">
          <span>S</span><span>M</span><span>T</span><span>W</span>
          <span>T</span><span>F</span><span>S</span>
        </div>
        <div class="days">${ds}</div>`;
    }

    init();
  </script>
</body>
</html>
